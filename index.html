<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 Top-Down Template</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom-content.css">
</head>
<body>
<div class="app-shell">
    <header class="app-header">
        <h1>Level 2 Top-Down Template</h1>
        <p>Edit data in <code>js/config.js</code> to change map, camera, collisions, and triggers.</p>
    </header>

    <main class="app-main">
        <section class="game-stage" aria-label="Game viewport area">
            <div id="game-scale-root" class="game-scale-root">
                <div id="game-viewport" class="game-viewport" aria-label="Game viewport">
                    <div id="game-world" class="game-world">
                        <img id="map-layer" class="map-layer" alt="Game map" src="">
                        <div id="trigger-layer" class="trigger-layer" aria-hidden="true"></div>
                        <div id="player-sprite" class="player-sprite" aria-label="Player character"></div>
                        <div id="teleport-effect" class="teleport-effect" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="side-panel" aria-label="Instructions">
            <section class="info-box" aria-label="Game information">
                <h2>Game Info</h2>
                <div id="game-info" class="game-info" aria-live="polite"></div>
            </section>
            <h2>Controls</h2>
            <ul>
                <li>Move: Arrow keys or WASD</li>
                <li>Interact: Space or Enter</li>
                <li>Close modal: Escape</li>
            </ul>
            <h2>Notes</h2>
            <p>Use a local server (for example Live Server) to run the project.</p>
        </aside>
    </main>
</div>

<div id="fatal-error" class="fatal-error" role="alert" hidden></div>

<div id="game-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel">
        <button id="modal-close" class="modal-close" type="button" aria-label="Close modal">X</button>
        <h2 id="modal-title"></h2>
        <div id="modal-content" class="modal-content"></div>
    </div>
</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
