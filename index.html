<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 Top-Down Template</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
    <header class="app-header">
        <h1>Feed the animals</h1>
        <p>Berry the bunny - The game for kids between 4 and 6 years!</p>
    </header>

    <main class="app-main">
        <section class="game-stage" aria-label="Game viewport area">
            <div id="game-scale-root" class="game-scale-root">
                <div id="game-viewport" class="game-viewport" aria-label="Game viewport">
                    <div id="game-world" class="game-world">
                        <img id="map-layer" class="map-layer" alt="Game map" src="">
                        <div id="trigger-layer" class="trigger-layer" aria-hidden="true"></div>
                        <div id="player-sprite" class="player-sprite" aria-label="Player character"></div>
                        <div id="trigger-top-layer" class="trigger-top-layer" aria-hidden="true"></div>
                        <img id="map-overlay-layer" class="map-overlay-layer" alt="" src="" hidden aria-hidden="true">
                        <div id="teleport-effect" class="teleport-effect" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="side-panel" aria-label="Instructions">
            <section class="info-box" aria-label="Debug controls">
                <button id="debug-toggle" class="debug-toggle" type="button" aria-expanded="false" aria-controls="debug-panel">
                    Debug
                </button>
                <div id="debug-panel" class="debug-panel hidden">
                    <div id="game-info" class="game-info" aria-live="polite"></div>
                </div>
            </section>
            <section class="info-box" aria-label="Player items">
                <h2>Spiseligt</h2>
                <div id="items-info" class="game-info" aria-live="polite"></div>
            </section>
            <section class="info-box" aria-label="Player stats">
                <h2>Ikke spiseligt</h2>
                <div id="stats-info" class="game-info" aria-live="polite"></div>
            </section>
            <h2>Controls</h2>
            <ul>
                <li>Move: Arrow keys or WASD</li>
                <li>Rabbit hole: Go over the tile</li>

            </ul>
        </aside>
    </main>
</div>

<div id="fatal-error" class="fatal-error" role="alert" hidden></div>

<div id="game-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel">
        <button id="modal-close" class="modal-close" type="button" aria-label="Close modal">X</button>
        <h2 id="modal-title"></h2>
        <div id="modal-content" class="modal-content"></div>
    </div>
</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
